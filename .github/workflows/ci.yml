name: CI

on:
  push:
    branches-ignore:
      - main
      - staging
    tags-ignore:
      - v*
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --workspaces --if-present

      - name: Build MCP server
        run: npm run build --workspace=packages/mcp-server

      - name: Build terminal dashboard
        run: npm run build --workspace=packages/terminal-dashboard

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
