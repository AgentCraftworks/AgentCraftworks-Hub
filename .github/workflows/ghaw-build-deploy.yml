name: "GH-AW: Build & Deploy"

# Unified build workflow for staging and production Electron app packages.
#
# Two trigger modes:
#   1. workflow_dispatch — manual trigger with environment + action selector
#   2. push to staging/main — auto-builds for the corresponding environment
#      (staging: unpacked dirs for testing; production: full installers)
#   3. v* tags on main — full production release published to GitHub Releases
#
# Engagement Level: T4 (Agent Team) — builds artifacts, publishes releases.

on:
  push:
    branches:
      - staging
      - main
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - build-and-upload
          - build-and-release
        default: build-and-upload

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "${{ matrix.platform }} → ${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'production' || github.ref_name == 'main' && 'production' || 'staging') }}"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Determine environment and action
        id: config
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env_name=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env_name=production" >> "$GITHUB_OUTPUT"
            echo "action=build-and-release" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "env_name=production" >> "$GITHUB_OUTPUT"
            echo "action=build-and-upload" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
            echo "action=build-and-upload" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (staging — unpacked dirs)
        if: steps.config.outputs.env_name == 'staging'
        shell: bash
        run: |
          npx electron-vite build
          npx electron-builder --${{ matrix.platform }} --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Electron app (production — full installers)
        if: steps.config.outputs.env_name == 'production' && steps.config.outputs.action == 'build-and-upload'
        shell: bash
        run: |
          npx electron-vite build
          npx electron-builder --${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build and publish release (production — GitHub Releases)
        if: steps.config.outputs.action == 'build-and-release'
        shell: bash
        run: npm run publish-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: steps.config.outputs.action == 'build-and-upload'
        uses: actions/upload-artifact@v4
        with:
          name: hub-${{ steps.config.outputs.env_name }}-${{ matrix.platform }}-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/win-unpacked/
            dist/mac/
            dist/linux-unpacked/
          if-no-files-found: warn
          retention-days: ${{ steps.config.outputs.env_name == 'staging' && 7 || 30 }}
