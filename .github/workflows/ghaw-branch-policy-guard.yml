name: "GH-AW: Branch Policy Guard"

# Enforces only the final promotion step: staging -> main.
# PRs into staging are unrestricted; PRs into main must come from staging.
# Engagement Level: T1 (Observer) - validates PR branch topology only.

on:
  pull_request:
    branches:
      - main
      - staging
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

jobs:
  validate-pr-flow:
    name: Validate PR Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Validate source and target branch policy
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "PR flow: ${HEAD} -> ${BASE}"

          # Only enforce: main <- staging
          if [[ "${BASE}" == "main" ]]; then
            if [[ "${HEAD}" != "staging" ]]; then
              echo "::error::PRs into main must come from staging. Got ${HEAD} -> main."
              exit 1
            fi
          fi
          # Staging accepts PRs from any branch - no name restrictions

          echo "Branch policy guard passed."
